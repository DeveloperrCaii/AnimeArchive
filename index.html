<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AnimeArchive | Perpustakaan Tontonan + Genre</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #faf8f4 0%, #f2eee9 100%);
            color: #1e1e2a;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* header */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d45a2b, #a63414);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .hero p {
            color: #5a5a6e;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* form card premium */
        .form-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 2.5rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
            align-items: end;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .input-group label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4b3b2c;
        }
        .input-group input, .input-group textarea, .input-group select {
            background: white;
            border: 1.5px solid #e2ddd6;
            border-radius: 1.2rem;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            transition: 0.2s;
            outline: none;
        }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: #d45a2b;
            box-shadow: 0 0 0 3px rgba(212, 95, 43, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 70px;
        }
        .btn {
            background: #d45a2b;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: #1e2a3e;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }
        .btn-primary:hover {
            background: #0f1a24;
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #1e2a3e;
            color: #1e2a3e;
        }
        .btn-outline:hover {
            background: #1e2a3e10;
        }

        /* toolbar filter + genre */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 3rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
        }
        .filter-group {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .alpha-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .alpha-btn {
            background: #f0ede8;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.8rem;
        }
        .alpha-btn.active {
            background: #d45a2b;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .genre-filter {
            background: #f5f2ed;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .genre-filter select {
            border: none;
            background: transparent;
            font-weight: 500;
            outline: none;
            padding: 0.4rem;
            font-size: 0.85rem;
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: #f5f2ed;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }
        .search-box input {
            border: none;
            background: transparent;
            padding: 0.5rem;
            width: 200px;
            outline: none;
        }
        /* anime grid card */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.8rem;
        }
        .anime-card {
            background: white;
            border-radius: 1.8rem;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 12px 26px -10px rgba(0,0,0,0.08);
            border: 1px solid #efe7dd;
            display: flex;
            flex-direction: column;
        }
        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 24px 36px -12px rgba(0,0,0,0.2);
        }
        .img-wrapper {
            height: 200px;
            background: #f2e9df;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }
        .no-img {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #b7aa99;
            font-size: 0.8rem;
            height: 100%;
        }
        .card-content {
            padding: 1.2rem 1.2rem 1rem;
            flex: 1;
        }
        .anime-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
            display: flex;
            justify-content: space-between;
        }
        .genre-badge {
            background: #ffede3;
            color: #c23b12;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            display: inline-block;
            margin: 0.4rem 0;
            width: fit-content;
        }
        .mc-name {
            font-weight: 600;
            color: #d45a2b;
            background: #fff0e8;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            margin: 0.5rem 0;
        }
        .review-text {
            font-size: 0.85rem;
            color: #4f4a44;
            margin: 0.7rem 0;
            line-height: 1.4;
            border-left: 3px solid #d45a2b;
            padding-left: 0.7rem;
        }
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            margin-top: 0.8rem;
            border-top: 1px solid #f0e2d4;
            padding-top: 0.8rem;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #8c7a68;
            transition: 0.1s;
        }
        .icon-btn.del:hover { color: #d9534f; }
        .icon-btn.edit:hover { color: #2c6e9e; }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: #fcf9f5;
            border-radius: 2rem;
            color: #ac9f8f;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #ad9f8e;
        }
        @media (max-width: 680px) {
            body { padding: 1rem; }
            .form-card { padding: 1.2rem; }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-film"></i> AnimeArchive</h1>
        <p>Bookmark + Genre, MC, Review, & Gambar — koleksi lengkap history anime mu</p>
    </div>

    <!-- Form Tambah/Edit dengan Genre -->
    <div class="form-card" id="formCard">
        <form id="animeForm">
            <div class="form-grid">
                <div class="input-group">
                    <label><i class="fas fa-heading"></i> Judul Anime *</label>
                    <input type="text" id="judul" placeholder="ex: Demon Slayer" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-tags"></i> Genre</label>
                    <select id="genreSelect">
                        <option value="Action">⚡ Action</option>
                        <option value="Adventure">🗺️ Adventure</option>
                        <option value="Comedy">😂 Comedy</option>
                        <option value="Drama">🎭 Drama</option>
                        <option value="Fantasy">✨ Fantasy</option>
                        <option value="Romance">❤️ Romance</option>
                        <option value="Sci-Fi">🚀 Sci-Fi</option>
                        <option value="Slice of Life">🍃 Slice of Life</option>
                        <option value="Thriller">🔪 Thriller</option>
                        <option value="Isekai">🌀 Isekai</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-ninja"></i> Nama MC</label>
                    <input type="text" id="mc" placeholder="Tanjiro, Luffy, dll">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-image"></i> URL Gambar</label>
                    <input type="url" id="gambarUrl" placeholder="https://...jpg atau png">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-comment-dots"></i> Pendapat / Review</label>
                    <textarea id="review" placeholder="Kesan, rating, atau catatan penting..."></textarea>
                </div>
                <div class="input-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn"><i class="fas fa-save"></i> Simpan Anime</button>
                    <button type="button" class="btn btn-outline" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i> Batal</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Toolbar filter A-Z + Genre filter + Search -->
    <div class="toolbar">
        <div class="filter-group">
            <span style="font-weight:600;"><i class="fas fa-filter"></i> A-Z :</span>
            <div class="alpha-buttons" id="alphaFilterContainer"></div>
            <div class="genre-filter">
                <i class="fas fa-theater-masks"></i>
                <select id="genreFilterSelect">
                    <option value="ALL">Semua Genre</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Slice of Life">Slice of Life</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Isekai">Isekai</option>
                </select>
            </div>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari judul / MC...">
        </div>
    </div>

    <!-- Daftar anime grid -->
    <div id="animeGridContainer" class="anime-grid"></div>
    <footer>
        <i class="fas fa-dragon"></i> Lengkapi dengan genre favorit — edit, hapus, filter A-Z & genre.
    </footer>
</div>

<script>
    // ----- Data & Penyimpanan -----
    let animeList = [];      // objek: id, judul, genre, mc, review, gambarUrl
    let editId = null;
    let currentAlphaFilter = "ALL";
    let currentGenreFilter = "ALL";
    let searchQuery = "";

    // Helper ID
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

    function saveToLocal() {
        localStorage.setItem('anime_archive_genre_list', JSON.stringify(animeList));
    }

    // Data contoh dengan genre
    function loadSampleData() {
        const stored = localStorage.getItem('anime_archive_genre_list');
        if(stored) {
            animeList = JSON.parse(stored);
        } else {
            animeList = [
                {
                    id: generateId(),
                    judul: "Demon Slayer",
                    genre: "Action",
                    mc: "Tanjiro Kamado",
                    review: "Animasi memukau, cerita menyentuh, aksi luar biasa.",
                    gambarUrl: "https://m.media-amazon.com/images/M/MV5BZjZjNzI5MDctY2Y4YS00NmM4LTkxMmUtZmI1NGM3YzU1YmU2XkEyXkFqcGc@._V1_.jpg"
                },
                {
                    id: generateId(),
                    judul: "Frieren",
                    genre: "Fantasy",
                    mc: "Frieren",
                    review: "Meditatif, emosional, petualangan abadi yang hangat.",
                    gambarUrl: "https://m.media-amazon.com/images/M/MV5BN2U1YzI0MzMtMzM3Yi00ZWNjLWI2MTUtNmRmMTU2ZTQ0MjY5XkEyXkFqcGc@._V1_.jpg"
                },
                {
                    id: generateId(),
                    judul: "Spy x Family",
                    genre: "Comedy",
                    mc: "Loid Forger",
                    review: "Lucu, mengharukan, Anya adalah segalanya.",
                    gambarUrl: "https://m.media-amazon.com/images/M/MV5BZGY5MjA5YzctNmQxZS00YzRlLTg1ZTItYjQ5MDc5YzkyMjNhXkEyXkFqcGc@._V1_.jpg"
                },
                {
                    id: generateId(),
                    judul: "Jujutsu Kaisen",
                    genre: "Action",
                    mc: "Yuji Itadori",
                    review: "Pertarungan spektakuler, karakter kuat.",
                    gambarUrl: "https://image.tmdb.org/t/p/original/3YpzV4FbKqVZgqZx7oQnF5pR1bW.jpg"
                },
                {
                    id: generateId(),
                    judul: "Kaguya-sama: Love is War",
                    genre: "Romance",
                    mc: "Kaguya Shinomiya",
                    review: "Romance komedi psikologis yang jenius.",
                    gambarUrl: "https://m.media-amazon.com/images/M/MV5BZTEyM2JjZmMtNTVlMi00ZGY1LWI1YjgtZjM2MTQwZDE0YTY4XkEyXkFqcGc@._V1_.jpg"
                }
            ];
            saveToLocal();
        }
        renderAll();
    }

    // Render tombol A-Z
    function renderAlphaFilterButtons() {
        const container = document.getElementById('alphaFilterContainer');
        if(!container) return;
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        let html = `<button class="alpha-btn ${currentAlphaFilter === 'ALL' ? 'active' : ''}" data-alpha="ALL">Semua</button>`;
        alphabet.forEach(letter => {
            html += `<button class="alpha-btn ${currentAlphaFilter === letter ? 'active' : ''}" data-alpha="${letter}">${letter}</button>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.alpha-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const alpha = btn.getAttribute('data-alpha');
                currentAlphaFilter = alpha;
                renderAlphaFilterButtons();
                applyFiltersAndRender();
            });
        });
    }

    // Filter logika
    function getFilteredList() {
        let filtered = [...animeList];
        // filter A-Z
        if(currentAlphaFilter !== 'ALL') {
            filtered = filtered.filter(anime => {
                const firstChar = anime.judul.trim().charAt(0).toUpperCase();
                return firstChar === currentAlphaFilter;
            });
        }
        // filter genre
        if(currentGenreFilter !== 'ALL') {
            filtered = filtered.filter(anime => anime.genre === currentGenreFilter);
        }
        // filter search
        if(searchQuery.trim() !== '') {
            const q = searchQuery.trim().toLowerCase();
            filtered = filtered.filter(anime => 
                anime.judul.toLowerCase().includes(q) || 
                (anime.mc && anime.mc.toLowerCase().includes(q))
            );
        }
        filtered.sort((a,b) => a.judul.localeCompare(b.judul));
        return filtered;
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function renderAnimeGrid() {
        const container = document.getElementById('animeGridContainer');
        if(!container) return;
        const filtered = getFilteredList();
        if(filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-tv fa-3x"></i><h3 style="margin-top:1rem;">Tidak ada anime ditemukan</h3><p>Coba ubah filter genre atau kata kunci</p></div>`;
            return;
        }
        let cardsHtml = '';
        filtered.forEach(anime => {
            const hasImg = anime.gambarUrl && anime.gambarUrl.trim() !== '';
            const imgHtml = hasImg ? 
                `<img src="${anime.gambarUrl}" alt="${escapeHtml(anime.judul)}" onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'no-img\'><i class=\'fas fa-image-slash\'></i><span>gagal muat</span></div>';">` :
                `<div class="no-img"><i class="fas fa-image" style="font-size:2rem;"></i><span>tambah gambar</span></div>`;
            
            cardsHtml += `
                <div class="anime-card" data-id="${anime.id}">
                    <div class="img-wrapper">
                        ${imgHtml}
                    </div>
                    <div class="card-content">
                        <div class="anime-title">
                            ${escapeHtml(anime.judul)}
                        </div>
                        <div class="genre-badge"><i class="fas fa-tag"></i> ${escapeHtml(anime.genre || 'Tidak ada genre')}</div>
                        <div class="mc-name"><i class="fas fa-user-astronaut"></i> MC: ${escapeHtml(anime.mc || '?')}</div>
                        <div class="review-text"><i class="fas fa-quote-left"></i> ${escapeHtml(anime.review || 'Tidak ada review')}</div>
                        <div class="card-actions">
                            <button class="icon-btn edit" data-id="${anime.id}" title="Edit"><i class="fas fa-pen"></i></button>
                            <button class="icon-btn del" data-id="${anime.id}" title="Hapus"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = cardsHtml;
        // event delete & edit
        document.querySelectorAll('.icon-btn.del').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if(confirm('Hapus anime dari koleksi?')) {
                    animeList = animeList.filter(a => a.id !== id);
                    saveToLocal();
                    if(editId === id) resetFormEditing();
                    applyFiltersAndRender();
                }
            });
        });
        document.querySelectorAll('.icon-btn.edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const target = animeList.find(a => a.id === id);
                if(target) populateFormForEdit(target);
            });
        });
    }

    function populateFormForEdit(anime) {
        document.getElementById('judul').value = anime.judul;
        document.getElementById('genreSelect').value = anime.genre || "Action";
        document.getElementById('mc').value = anime.mc || '';
        document.getElementById('gambarUrl').value = anime.gambarUrl || '';
        document.getElementById('review').value = anime.review || '';
        editId = anime.id;
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');
        submitBtn.innerHTML = '<i class="fas fa-pen-fancy"></i> Update Anime';
        cancelBtn.style.display = 'inline-flex';
        document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
    }

    function resetFormEditing() {
        document.getElementById('animeForm').reset();
        // set default genre
        document.getElementById('genreSelect').value = "Action";
        editId = null;
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Simpan Anime';
        cancelBtn.style.display = 'none';
    }

    function handleSubmit(e) {
        e.preventDefault();
        const judul = document.getElementById('judul').value.trim();
        if(!judul) {
            alert('Judul anime wajib diisi!');
            return;
        }
        const genre = document.getElementById('genreSelect').value;
        const mc = document.getElementById('mc').value.trim();
        const gambarUrl = document.getElementById('gambarUrl').value.trim();
        const review = document.getElementById('review').value.trim();

        if(editId !== null) {
            const index = animeList.findIndex(a => a.id === editId);
            if(index !== -1) {
                animeList[index] = {
                    ...animeList[index],
                    judul: judul,
                    genre: genre,
                    mc: mc,
                    gambarUrl: gambarUrl,
                    review: review
                };
                saveToLocal();
                resetFormEditing();
                applyFiltersAndRender();
            } else {
                alert('Data tidak ditemukan');
                resetFormEditing();
            }
        } else {
            const newAnime = {
                id: generateId(),
                judul: judul,
                genre: genre,
                mc: mc,
                review: review,
                gambarUrl: gambarUrl
            };
            animeList.push(newAnime);
            saveToLocal();
            resetFormEditing();
            applyFiltersAndRender();
        }
        document.getElementById('animeForm').reset();
        document.getElementById('genreSelect').value = "Action";
    }

    function applyFiltersAndRender() {
        renderAnimeGrid();
        renderAlphaFilterButtons();  // update active class
        // sync dropdown genre filter value with currentGenreFilter
        const genreFilterSelect = document.getElementById('genreFilterSelect');
        if(genreFilterSelect) genreFilterSelect.value = currentGenreFilter;
    }

    function initGenreFilterListener() {
        const genreFilterSelect = document.getElementById('genreFilterSelect');
        genreFilterSelect.addEventListener('change', (e) => {
            currentGenreFilter = e.target.value;
            applyFiltersAndRender();
        });
    }

    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applyFiltersAndRender();
        });
    }

    function renderAll() {
        renderAlphaFilterButtons();
        renderAnimeGrid();
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadSampleData();
        const form = document.getElementById('animeForm');
        form.addEventListener('submit', handleSubmit);
        const cancelBtn = document.getElementById('cancelEditBtn');
        cancelBtn.addEventListener('click', () => {
            resetFormEditing();
            form.reset();
            document.getElementById('genreSelect').value = "Action";
        });
